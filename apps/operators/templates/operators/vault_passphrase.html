{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frase de contraseña — Llavero</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      background: #f5f6fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
    }
    .title { font-size: 1.2rem; font-weight: 700; color: #1d4ed8; margin-bottom: 0.25rem; }
    .sub { font-size: 0.82rem; color: #6b7280; margin-bottom: 1.75rem; }
    .form-row { margin-bottom: 1rem; }
    .form-row label { display: block; font-weight: 500; margin-bottom: 0.3rem; font-size: 0.875rem; }
    .form-row input {
      width: 100%;
      padding: 0.45rem 0.65rem;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      font-size: 0.875rem;
    }
    .form-row input:focus { outline: none; border-color: #1d4ed8; box-shadow: 0 0 0 2px rgba(29,78,216,.15); }
    .btn {
      display: block; width: 100%; padding: 0.55rem;
      background: #1d4ed8; color: #fff; border: none; border-radius: 4px;
      font-size: 0.9rem; font-weight: 600; cursor: pointer; margin-top: 1.5rem;
    }
    .btn:hover { background: #1e40af; }
    .error { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; padding: 0.65rem 0.85rem; border-radius: 4px; font-size: 0.85rem; margin-bottom: 1.25rem; }
    .back { display: block; text-align: center; margin-top: 1rem; font-size: 0.8rem; color: #6b7280; text-decoration: none; }
    .back:hover { color: #1d4ed8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">Frase de contraseña</div>
    <div class="sub">Ingrese la frase de contraseña del vault para continuar</div>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="form-row">
        <label for="passphrase">Frase de contraseña</label>
        <input type="password" id="passphrase" name="passphrase" autocomplete="current-password" autofocus required>
      </div>
      <button type="submit" class="btn">Desbloquear vault</button>
    </form>
    <a href="/auth/login/" class="back">Volver al inicio de sesión</a>
  </div>
</body>
</html>
