{% comment %}
HTMX partial: one row for an active link with an "end" button.
Context: link (LinkBase instance), link_type (str), label (str), viewer (bool)
{% endcomment %}
<li style="padding:0.3rem 0;border-bottom:1px solid #f3f4f6;display:flex;align-items:center;gap:0.5rem;">
  <span>{{ label }}</span>
  {% if not viewer %}
  <form method="post"
        action="{% url 'link-end' link.pk %}"
        style="margin:0;"
        hx-post="{% url 'link-end' link.pk %}"
        hx-target="body">
    {% csrf_token %}
    <input type="hidden" name="link_type" value="{{ link_type }}">
    <button type="submit" class="btn btn-danger btn-sm">Terminar</button>
  </form>
  {% endif %}
</li>
