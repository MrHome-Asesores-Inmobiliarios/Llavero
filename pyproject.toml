[tool.black]
line-length = 100
target-version = ["py312"]
exclude = '''
/(
    \.venv
  | migrations
)/
'''

[tool.ruff]
line-length = 100
target-version = "py312"
exclude = [".venv", "migrations"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "S",   # flake8-bandit (security)
    "UP",  # pyupgrade
]
ignore = [
    "S101",  # assert in tests is fine
    "S105",  # hardcoded passwords caught by decouple, not bandit
    "S106",
]

[tool.ruff.lint.per-file-ignores]
"*/tests/*" = ["S", "B"]
"*/migrations/*" = ["E501"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "llavero.settings.dev"
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "--tb=short -q"

[tool.coverage.run]
source = ["."]
omit = [
    ".venv/*",
    "*/migrations/*",
    "manage.py",
    "*/settings/*",
    "deploy/*",
]
