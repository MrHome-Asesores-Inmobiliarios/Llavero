# Llavero reverse proxy — internal interface only, internal CA TLS.
# Terminates HTTPS and forwards to gunicorn on the unix socket.
# Place in /etc/nginx/sites-available/llavero and symlink to sites-enabled/.

server {
    listen 80;
    server_name llavero.internal;
    # Redirect all plain HTTP to HTTPS even on the internal network.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name llavero.internal;

    # TLS — internal CA certificate.
    # Generate: see deploy/README.md (openssl req + sign with internal CA).
    ssl_certificate     /etc/ssl/llavero/llavero.internal.crt;
    ssl_certificate_key /etc/ssl/llavero/llavero.internal.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers "ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305";
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS — internal CA, so this is safe to set.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy "same-origin" always;

    # Only allow access from the internal management range and VPN.
    # Adjust to match your actual management subnet.
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    deny all;

    client_max_body_size 10m;

    location /static/ {
        alias /opt/llavero/static_collected/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://unix:/run/llavero/gunicorn.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
